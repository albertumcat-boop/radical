<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PatrónAI Pro</title>

  <style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0d0d14;--surface:#141420;--panel:#1c1c2a;--inp:#232333;
    --hov:#2a2a3e;--brd:#2e2e45;--brd2:#3d3d58;
    --acc:#8b5cf6;--acc2:#a78bfa;--accbg:rgba(139,92,246,.12);
    --grn:#34d399;--red:#f87171;--yel:#fbbf24;
    --tx:#ede9fe;--tx2:#9490b0;--tx3:#5a5678;
    --sw:300px;--th:52px;
    --font:'Segoe UI',system-ui,sans-serif;
    --mono:'Cascadia Code','Fira Code',monospace;
    --r:8px;--r2:12px;--ease:.16s cubic-bezier(.4,0,.2,1);
  }
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--font);font-size:13px;-webkit-font-smoothing:antialiased}
  #app{display:flex;height:100vh;width:100vw;overflow:hidden}

  /* ── Sidebar ── */
  #sidebar{width:var(--sw);min-width:var(--sw);background:var(--surface);border-right:1px solid var(--brd);display:flex;flex-direction:column;transition:width var(--ease),min-width var(--ease);overflow:hidden;z-index:20;flex-shrink:0}
  #sidebar.collapsed{width:52px;min-width:52px}
  #sidebar.collapsed .sb-body,#sidebar.collapsed .sb-foot{opacity:0;pointer-events:none}
  #sidebar.collapsed .sb-logo{justify-content:center}
  #sidebar.collapsed .logo-text,#sidebar.collapsed .collapse-btn{display:none}
  #sidebar.collapsed .logo-mark{cursor:pointer;box-shadow:0 0 0 2px var(--acc2);animation:blink 2s infinite}
  .sb-logo{display:flex;align-items:center;gap:10px;padding:14px;border-bottom:1px solid var(--brd);flex-shrink:0;background:linear-gradient(135deg,rgba(139,92,246,.07) 0%,transparent 100%)}
  .logo-mark{width:34px;height:34px;border-radius:var(--r);background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff;flex-shrink:0;box-shadow:0 2px 12px rgba(139,92,246,.4)}
  .logo-text{display:flex;flex-direction:column;min-width:0}
  .logo-name{font-size:15px;font-weight:800;letter-spacing:-.4px;white-space:nowrap}
  .logo-tag{font-size:9px;font-weight:700;color:var(--acc2);text-transform:uppercase;letter-spacing:1px}
  .collapse-btn{margin-left:auto;background:none;border:1px solid var(--brd);color:var(--tx3);border-radius:var(--r);width:26px;height:26px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all var(--ease);flex-shrink:0}
  .collapse-btn:hover{background:var(--hov);color:var(--tx);border-color:var(--brd2)}
  .sb-body{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:var(--brd) transparent}
  .sb-body::-webkit-scrollbar{width:3px}
  .sb-body::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px}
  .sb-sec{padding:14px;border-bottom:1px solid var(--brd)}
  .sec-title{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--tx3);margin-bottom:12px}
  .badge-u{background:var(--accbg);color:var(--acc2);border:1px solid rgba(139,92,246,.25);padding:1px 6px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:0;text-transform:lowercase}
  .garment-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
  .garment-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px 8px;background:var(--inp);border:1.5px solid var(--brd);border-radius:var(--r);cursor:pointer;color:var(--tx2);font-family:var(--font);transition:all var(--ease);position:relative;user-select:none}
  .g-icon{font-size:20px;line-height:1}
  .g-label{font-size:9px;font-weight:600;white-space:nowrap}
  .garment-btn:hover{background:var(--hov);border-color:var(--brd2);color:var(--tx);transform:translateY(-2px)}
  .garment-btn:active{transform:translateY(0)}
  .garment-btn.active{background:var(--accbg);border-color:var(--acc);color:var(--acc2);box-shadow:0 0 0 1px rgba(139,92,246,.2),0 2px 8px rgba(139,92,246,.15)}
  .garment-btn.locked{opacity:.4}
  .garment-btn.locked::after{content:'🔒';position:absolute;top:2px;right:3px;font-size:8px}
  .radio-grp{display:flex;gap:6px}
  .radio-opt{display:flex;align-items:center;gap:6px;padding:7px 12px;background:var(--inp);border:1.5px solid var(--brd);border-radius:var(--r);cursor:pointer;font-size:12px;color:var(--tx2);flex:1;transition:all var(--ease)}
  .radio-opt:hover{background:var(--hov);color:var(--tx)}
  .radio-opt input{accent-color:var(--acc)}
  .mgrp-title{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;margin:10px 0 8px;display:flex;align-items:center;gap:8px}
  .mgrp-title::after{content:'';flex:1;height:1px;background:var(--brd)}
  .m-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;gap:8px}
  .m-row label{color:var(--tx2);font-size:12px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px}
  .m-row input[type="number"],.m-row select{width:76px;background:var(--inp);border:1.5px solid var(--brd);color:var(--tx);border-radius:var(--r);padding:5px 8px;font-size:12px;font-family:var(--mono);text-align:right;outline:none;transition:border-color var(--ease),box-shadow var(--ease);-moz-appearance:textfield}
  .m-row input::-webkit-inner-spin-button{opacity:.4}
  .m-row input:focus,.m-row select:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(139,92,246,.15)}
  .m-row select{width:92px;text-align:left;cursor:pointer}
  .aff-row{display:flex;gap:6px;margin-bottom:5px}
  .aff-row input{flex:1;background:var(--inp);border:1.5px solid var(--brd);color:var(--tx);border-radius:var(--r);padding:6px 10px;font-size:11px;font-family:var(--mono);text-transform:uppercase;outline:none;transition:border-color var(--ease)}
  .aff-row input:focus{border-color:var(--acc)}
  .aff-row button{background:var(--inp);border:1.5px solid var(--brd);color:var(--tx2);border-radius:var(--r);padding:6px 12px;font-size:14px;font-weight:700;cursor:pointer;transition:all var(--ease)}
  .aff-row button:hover{background:var(--hov);color:var(--grn);border-color:var(--grn)}
  #aff-msg{font-size:10px;min-height:14px;color:var(--tx3)}
  .sb-actions{display:flex;flex-direction:column;gap:8px}
  .btn-p,.btn-s,.btn-g{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:10px 14px;border-radius:var(--r);border:none;font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all var(--ease);letter-spacing:.2px}
  .btn-p{background:var(--acc);color:#fff;box-shadow:0 2px 12px rgba(139,92,246,.35)}
  .btn-p:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 4px 20px rgba(139,92,246,.5)}
  .btn-p:active{transform:translateY(0)}
  .btn-s{background:var(--inp);color:var(--tx);border:1.5px solid var(--brd2)}
  .btn-s:hover{background:var(--hov);border-color:rgba(139,92,246,.4)}
  .btn-g{background:transparent;color:var(--tx2);border:1.5px solid var(--brd)}
  .btn-g:hover{background:var(--inp);color:var(--tx);border-color:var(--brd2)}
  .chip-exp{background:var(--yel);color:#000;font-size:8px;font-weight:800;padding:1px 5px;border-radius:6px;letter-spacing:.5px}
  .sb-foot{padding:11px 14px;border-top:1px solid var(--brd);display:flex;align-items:center;gap:8px;font-size:11px;color:var(--tx3);flex-shrink:0}
  .scale-dot{width:7px;height:7px;border-radius:50%;background:var(--grn);box-shadow:0 0 6px var(--grn);animation:blink 2.5s infinite;flex-shrink:0}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

  /* ── Main ── */
  #main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
  #topbar{height:var(--th);background:var(--surface);border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:12px;padding:0 16px;flex-shrink:0}
  .view-sw{display:flex;gap:2px;background:var(--inp);border:1px solid var(--brd);border-radius:var(--r);padding:3px}
  .view-btn{display:flex;align-items:center;gap:6px;padding:5px 14px;border-radius:6px;border:none;background:transparent;color:var(--tx2);cursor:pointer;font-size:12px;font-weight:600;font-family:var(--font);transition:all var(--ease);white-space:nowrap}
  .view-btn:hover{color:var(--tx);background:rgba(255,255,255,.04)}
  .view-btn.active{background:var(--acc);color:#fff;box-shadow:0 1px 8px rgba(139,92,246,.35)}
  .tb-info{flex:1;display:flex;gap:8px;overflow:hidden}
  .info-tag{background:var(--inp);border:1px solid var(--brd);color:var(--tx2);padding:3px 12px;border-radius:20px;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .zoom-bar{display:flex;align-items:center;gap:4px;background:var(--inp);border:1px solid var(--brd);border-radius:var(--r);padding:3px 6px}
  .zoom-btn{background:none;border:none;color:var(--tx2);cursor:pointer;width:26px;height:26px;border-radius:5px;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all var(--ease)}
  .zoom-btn:hover{background:var(--hov);color:var(--tx)}
  #zoom-label{font-size:11px;color:var(--tx2);min-width:42px;text-align:center;font-family:var(--mono);font-weight:700}
  .view-area{flex:1;position:relative;overflow:hidden;display:none}
  .view-area.on{display:flex}
  #view-pattern{background:radial-gradient(ellipse at 15% 50%,rgba(139,92,246,.05) 0%,transparent 55%),radial-gradient(ellipse at 85% 20%,rgba(96,165,250,.04) 0%,transparent 45%),#0a0a12}
  #svg-wrapper{width:100%;height:100%;overflow:hidden;cursor:grab;position:relative}
  #svg-wrapper:active{cursor:grabbing}
  #svg-pan{transform-origin:0 0;will-change:transform}
  #pattern-svg{display:block;overflow:visible}
  #legend{position:absolute;bottom:16px;left:16px;background:rgba(18,18,30,.93);border:1px solid var(--brd2);border-radius:var(--r);padding:12px 14px;display:flex;flex-direction:column;gap:6px;backdrop-filter:blur(10px)}
  .leg-row{display:flex;align-items:center;gap:10px;font-size:10px;color:var(--tx2)}
  .leg-ln{display:inline-block;width:26px;height:2px;border-radius:1px;flex-shrink:0}
  .lc{background:#e2e8f0}
  .ls{background:repeating-linear-gradient(90deg,#666 0,#666 4px,transparent 4px,transparent 8px)}
  .lg{background:#60a5fa}
  .lf{background:repeating-linear-gradient(90deg,#f87171 0,#f87171 6px,transparent 6px,transparent 10px)}
  #cal-badge{position:absolute;bottom:16px;right:16px;background:rgba(18,18,30,.93);border:1px solid var(--brd2);border-radius:var(--r);padding:10px 12px;display:flex;flex-direction:column;align-items:center;gap:5px;font-size:10px;color:var(--tx3);backdrop-filter:blur(10px)}
  #view-3d{background:#06060e}
  #three-canvas{width:100%;height:100%;display:block}
  #ctrl-3d{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;background:rgba(18,18,30,.93);border:1px solid var(--brd2);border-radius:24px;padding:7px 16px;backdrop-filter:blur(10px)}
  .c3-btn{background:none;border:1px solid var(--brd);color:var(--tx2);border-radius:var(--r);padding:5px 10px;cursor:pointer;font-size:14px;transition:all var(--ease)}
  .c3-btn:hover{background:var(--hov);color:var(--tx)}
  .c3-hint{font-size:11px;color:var(--tx3)}

  /* ── Modales ── */
  .modal{position:fixed;inset:0;z-index:500;display:none;align-items:center;justify-content:center}
  .modal.open{display:flex}
  .m-ov{position:absolute;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px)}
  .m-box{position:relative;z-index:1;background:var(--panel);border:1px solid var(--brd2);border-radius:var(--r2);width:min(420px,92vw);box-shadow:0 8px 40px rgba(0,0,0,.6);overflow:hidden}
  .m-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--brd)}
  .m-head h3{font-size:15px;font-weight:700}
  .m-close{background:none;border:none;color:var(--tx3);font-size:16px;cursor:pointer;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all var(--ease)}
  .m-close:hover{background:var(--hov);color:var(--tx)}
  .m-body{padding:20px}
  .m-foot{padding:16px 20px;border-top:1px solid var(--brd);display:flex;gap:8px;justify-content:flex-end}
  .f-label{display:block;font-size:11px;color:var(--tx2);margin-bottom:8px;font-weight:600;letter-spacing:.4px;text-transform:uppercase}
  .f-inp{width:100%;background:var(--inp);border:1.5px solid var(--brd);color:var(--tx);border-radius:var(--r);padding:9px 12px;font-size:13px;font-family:var(--font);outline:none;transition:border-color var(--ease)}
  .f-inp:focus{border-color:var(--acc)}
  #saved-list{max-height:320px;overflow-y:auto}
  .pat-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--inp);border:1px solid var(--brd);border-radius:var(--r);margin-bottom:6px;transition:all var(--ease)}
  .pat-item:hover{background:var(--hov);border-color:var(--brd2)}
  .pat-name{font-weight:600;font-size:13px;margin-bottom:2px}
  .pat-meta{font-size:11px;color:var(--tx3)}
  .pat-acts{display:flex;gap:6px}
  .pat-acts button{background:none;border:1px solid var(--brd);color:var(--tx2);border-radius:6px;padding:4px 9px;font-size:13px;cursor:pointer;transition:all var(--ease)}
  .pat-acts button:hover{background:var(--hov);color:var(--tx)}

  /* ── Toasts ── */
  #toasts{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:2000;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none}
  .toast{background:var(--panel);border:1px solid var(--brd2);color:var(--tx);padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;box-shadow:0 4px 24px rgba(0,0,0,.5);display:flex;align-items:center;gap:8px;animation:tin .22s ease,tout .22s ease 2.8s forwards;white-space:nowrap}
  .toast.success{border-color:var(--grn)}
  .toast.error{border-color:var(--red)}
  .toast.warning{border-color:var(--yel)}
  @keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes tout{from{opacity:1}to{opacity:0;transform:translateY(8px)}}

  /* ── Monetización ── */
  .modal-upgrade{width:min(860px,95vw);max-height:90vh;overflow-y:auto;position:relative}
  .modal-paywall{width:min(380px,95vw);text-align:center}
  .tier-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0}
  @media(max-width:640px){.tier-cards{grid-template-columns:1fr}}
  .tier-card{background:var(--inp);border:1px solid var(--brd);border-radius:var(--r2);overflow:hidden;transition:transform var(--ease),box-shadow var(--ease)}
  .tier-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
  .tier-card.featured{border-color:var(--acc);box-shadow:0 0 0 1px var(--acc)}
  .tier-ch{padding:20px 16px 12px;text-align:center;border-bottom:1px solid var(--brd)}
  .tier-emoji{font-size:28px;display:block;margin-bottom:6px}
  .tier-price{font-size:26px;font-weight:800}
  .tier-psub{font-size:11px;color:var(--tx3);margin-top:2px}
  .tier-feats{list-style:none;padding:14px 16px;font-size:12px;color:var(--tx2);display:flex;flex-direction:column;gap:6px}
  .tier-pop{background:var(--acc);color:#fff;font-size:10px;font-weight:700;text-align:center;padding:4px;letter-spacing:.5px}
  .tier-curr{margin:12px;text-align:center;font-size:11px;color:var(--tx3);padding:6px;background:var(--hov);border-radius:var(--r)}
  .atelier-content{position:relative;z-index:1;background:var(--panel);border:1px solid var(--brd2);border-radius:var(--r2);width:min(860px,95vw);max-height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.6)}
  .at-head{display:flex;align-items:flex-start;justify-content:space-between;padding:20px;border-bottom:1px solid var(--brd);flex-shrink:0}
  .at-clients{flex:1;overflow-y:auto;padding:12px 20px;display:flex;flex-direction:column;gap:8px}
  .client-card{display:flex;align-items:center;gap:14px;background:var(--inp);border:1px solid var(--brd);border-radius:var(--r);padding:12px 14px;transition:all var(--ease)}
  .client-card:hover{background:var(--hov);border-color:var(--brd2)}
  .cli-av{width:38px;height:38px;border-radius:50%;background:var(--accbg);color:var(--acc2);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
  .at-stats{display:flex;gap:12px;padding:12px 20px;border-top:1px solid var(--brd);flex-shrink:0}
  .stat-i{text-align:center;flex:1}
  .stat-v{font-size:18px;font-weight:800;color:var(--acc2)}
  .stat-l{font-size:10px;color:var(--tx3);margin-top:2px}
  .aff-banner{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--grn);border-radius:20px;padding:6px 16px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:8px;z-index:990;color:var(--grn);box-shadow:0 2px 12px rgba(52,211,153,.2);white-space:nowrap}
  #tier-badge{position:fixed;top:10px;right:14px;z-index:999;background:var(--panel);border:1px solid var(--brd2);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:6px;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.3)}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px}
  @media(max-width:640px){
    :root{--sw:100vw}
    #app{flex-direction:column}
    #sidebar{width:100%!important;min-width:100%!important;height:auto;max-height:52vh}
    #main{height:48vh}
    .tb-info{display:none}
  }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body>

<div id="app">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sb-logo">
      <div class="logo-mark" id="logo-mark">✂</div>
      <div class="logo-text">
        <span class="logo-name">PatrónAI</span>
        <span class="logo-tag">Pro</span>
      </div>
      <button id="sidebar-toggle" class="collapse-btn">‹</button>
    </div>

    <div class="sb-body">
      <div class="sb-sec">
        <div class="sec-title">Tipo de prenda</div>
        <div class="garment-grid">
          <button class="garment-btn active" data-garment="franela"><span class="g-icon">👕</span><span class="g-label">Franela</span></button>
          <button class="garment-btn" data-garment="blusa"><span class="g-icon">👚</span><span class="g-label">Blusa</span></button>
          <button class="garment-btn" data-garment="camisa"><span class="g-icon">👔</span><span class="g-label">Camisa</span></button>
          <button class="garment-btn" data-garment="falda"><span class="g-icon">👗</span><span class="g-label">Falda</span></button>
          <button class="garment-btn" data-garment="vestido"><span class="g-icon">🥻</span><span class="g-label">Vestido</span></button>
        </div>
      </div>

      <div class="sb-sec" id="shirt-options" style="display:none">
        <div class="sec-title">Estilo</div>
        <div class="radio-grp">
          <label class="radio-opt"><input type="radio" name="shirt-gender" value="dama" checked><span>Dama</span></label>
          <label class="radio-opt"><input type="radio" name="shirt-gender" value="caballero"><span>Caballero</span></label>
        </div>
      </div>

      <div class="sb-sec">
        <div class="sec-title">Medidas <span class="badge-u">cm</span></div>
        <div class="mgrp-title">Contornos</div>
        <div class="m-row"><label>Busto / Pecho</label><input type="number" data-measure="bust" value="88" min="50" max="200" step="0.5"></div>

<!-- ══════════════════════════════════════════════════════ -->
<!-- PATTERN DRAFTER — Motor de trazado manual             -->
<!-- ══════════════════════════════════════════════════════ -->
<script>
'use strict';
window.PAT = window.PAT || {};
PAT.Drafter = (function(){
  const NS='http://www.w3.org/2000/svg';
  let _pts={},_lines=[],_errs=[],_warns=[],_name='Pieza',_first=null;

  function _vars(m){
    const b=(m.bust||88)*10,w=(m.waist||68)*10,h=(m.hip||94)*10,
          sh=(m.shoulder||38)*10,nk=(m.neck||36)*10;
    return{
      BUSTO:b,CINTURA:w,CADERA:h,ESPALDA:sh,CUELLO:nk,
      TALLE_ESP:(m.backLength||40)*10,TALLE_DEL:(m.frontLength||42)*10,
      LARGO:(m.totalLength||65)*10,MANGA:(m.sleeveLength||60)*10,
      MUNECA:(m.wrist||16)*10,FALDA:(m.skirtLength||60)*10,
      CADERA_PROF:(m.hipDepth||20)*10,
      B4:b/4,B6:b/6,B8:b/8,B10:b/10,B12:b/12,
      W4:w/4,H4:h/4,E2:sh/2
    };
  }

  function _eval(expr,vars){
    if(!expr)return 0;
    let c=String(expr).trim();
    Object.entries(vars).forEach(([k,v])=>{
      c=c.replace(new RegExp('\\b'+k+'\\b','g'),v.toFixed(4));
    });
    if(!/^[\d\s+\-*/().]+$/.test(c))throw new Error('Expr inválida: '+c);
    return Math.round(Function('"use strict";return('+c+')')() * 100)/100;
  }

  function reset(){_pts={};_lines=[];_errs=[];_warns=[];_first=null;_name='Pieza';}

  function _tok(line){
    const t=[];let cur='',q=false;
    for(const ch of line){
      if(ch==='"'){q=!q;continue;}
      if(ch===' '&&!q){if(cur){t.push(cur);cur='';}}else cur+=ch;
    }
    if(cur)t.push(cur);
    return t;
  }

  function _gp(tokens,key){
    const k=key.toLowerCase()+':';
    for(const t of tokens)if(t.toLowerCase().startsWith(k))return t.slice(k.length);
    return null;
  }

  function _chk(){for(const n of arguments)if(typeof n==='string'&&!_pts[n])throw new Error('Punto "'+n+'" no definido');}
  function _mid(a,b){const pa=_pts[a],pb=_pts[b];return{x:(pa.x+pb.x)/2,y:(pa.y+pb.y)/2};}
  function _dst(a,b){const pa=_pts[a],pb=_pts[b];return Math.hypot(pb.x-pa.x,pb.y-pa.y);}
  function _prp(a,b,d){const pa=_pts[a],pb=_pts[b],dx=pb.x-pa.x,dy=pb.y-pa.y,len=Math.hypot(dx,dy)||1;return{x:-dy/len*d,y:dx/len*d};}

  function _parsePunto(t,vars){
    if(t.length<2)throw new Error('PUNTO requiere nombre');
    const nm=t[1].toUpperCase();let x=0,y=0;
    if(t[2]&&t[2].includes(',')&&!t[2].includes(':')){
      const p=t[2].split(',');x=_eval(p[0],vars);y=_eval(p[1],vars);
    }else if(_gp(t,'x')||_gp(t,'y')){
      x=_eval(_gp(t,'x')||'0',vars);y=_eval(_gp(t,'y')||'0',vars);
    }else{
      const desde=_gp(t,'desde')||_gp(t,'de');
      if(desde){const r=_pts[desde.toUpperCase()];if(!r)throw new Error('Ref "'+desde+'" no existe');x=r.x;y=r.y;}
      x+=_eval(_gp(t,'der')||_gp(t,'derecha')||'0',vars)-_eval(_gp(t,'izq')||_gp(t,'izquierda')||'0',vars);
      y+=_eval(_gp(t,'abajo')||_gp(t,'bajo')||'0',vars)-_eval(_gp(t,'arriba')||_gp(t,'arr')||'0',vars);
    }
    if(isNaN(x)||isNaN(y))throw new Error('Coords inválidas: '+nm);
    _pts[nm]={x,y};if(!_first)_first=nm;
  }

  function _parseLinea(t){
    if(t.length<3)throw new Error('LINEA requiere 2 puntos');
    const f=t[1].toUpperCase(),to=t[2].toUpperCase();_chk(f,to);
    _lines.push({type:'line',from:f,to,style:(t[3]||'corte').toLowerCase()});
  }

  function _parseCurva(t,vars){
    if(t.length<3)throw new Error('CURVA requiere 2 puntos');
    const f=t[1].toUpperCase(),to=t[2].toUpperCase();_chk(f,to);
    const cv=_gp(t,'control')||_gp(t,'ctrl'),sv=_gp(t,'semicurva')||_gp(t,'semi'),cpv=_gp(t,'cp');
    let cp1=null,cp2=null;
    if(cv){const d=_eval(cv,vars),m=_mid(f,to),p=_prp(f,to,d);cp1=cp2={x:m.x+p.x,y:m.y+p.y};}
    else if(sv){const d=_eval(sv,vars),a=_pts[f],b=_pts[to];cp1={x:a.x+(b.x-a.x)*.3,y:a.y+(b.y-a.y)*.1-d};cp2={x:a.x+(b.x-a.x)*.7,y:a.y+(b.y-a.y)*.9-d*.3};}
    else if(cpv){const p=cpv.split(',');cp1=cp2={x:_eval(p[0],vars),y:_eval(p[1],vars)};}
    else{const d=_dst(f,to)*.25,p=_prp(f,to,d),m=_mid(f,to);cp1=cp2={x:m.x+p.x,y:m.y+p.y};}
    _lines.push({type:'curve',from:f,to,cp1,cp2});
  }

  function _parseLine(line,vars){
    const t=_tok(line);if(!t.length)return;
    const cmd=t[0].toUpperCase();
    try{
      switch(cmd){
        case 'PIEZA':case 'NOMBRE':_name=t.slice(1).join(' ').replace(/"/g,'');break;
        case 'PUNTO':case 'P':_parsePunto(t,vars);break;
        case 'LINEA':case 'L':_parseLinea(t);break;
        case 'CURVA':case 'C':_parseCurva(t,vars);break;
        case 'DOBLEZ':if(t.length>=3){_chk(t[1].toUpperCase(),t[2].toUpperCase());_lines.push({type:'fold',from:t[1].toUpperCase(),to:t[2].toUpperCase()});}break;
        case 'HILO':if(t.length>=3){_chk(t[1].toUpperCase(),t[2].toUpperCase());_lines.push({type:'grain',from:t[1].toUpperCase(),to:t[2].toUpperCase()});}break;
        case 'MUESCA':case 'N':{const lr=_gp(t,'linea')||_gp(t,'l'),pos=parseFloat(_gp(t,'pos')||'.5');if(lr&&lr.length>=2)_lines.push({type:'notch',from:lr[0].toUpperCase(),to:lr.slice(1).toUpperCase(),pos});}break;
        case 'COTA':if(t.length>=3){const f=t[1].toUpperCase(),to=t[2].toUpperCase(),lb=t.slice(3).join(' ').replace(/"/g,'');_lines.push({type:'dim',from:f,to,label:lb});}break;
        case 'CERRAR':case 'Z':{const ns=Object.keys(_pts);if(_first&&ns.length>0)_lines.push({type:'line',from:ns[ns.length-1],to:_first,style:'corte'});}break;
        case 'ARCO':if(t.length>=3){const f=t[1].toUpperCase(),to=t[2].toUpperCase();_chk(f,to);const r=parseFloat(_gp(t,'radio')||'50'),d=_gp(t,'dir')||'convexo';_lines.push({type:'arc',from:f,to,radio:r,dir:d});}break;
        default:
          if(/^[A-Z]+\.\d+[a-z]?$/i.test(cmd)&&t[1]){
            const sub=t.slice(1).join(' ');try{_parseLine(sub,vars);}catch(e){}
          }
      }
    }catch(e){_errs.push(e.message);}
  }

  function _svg(){
    if(!Object.keys(_pts).length)return null;
    const g=document.createElementNS(NS,'g');
    const cl=_lines.filter(l=>l.type==='line'||l.type==='curve'||l.type==='arc');
    let d='',started=false;
    cl.forEach(l=>{
      const a=_pts[l.from],b=_pts[l.to];if(!a||!b)return;
      if(!started){d+='M '+a.x+' '+a.y;started=true;}
      if(l.type==='line')d+=' L '+b.x+' '+b.y;
      else if(l.type==='curve'&&l.cp1){
        if(l.cp1.x===l.cp2?.x&&l.cp1.y===l.cp2?.y)d+=' Q '+l.cp1.x+' '+l.cp1.y+' '+b.x+' '+b.y;
        else d+=' C '+l.cp1.x+' '+l.cp1.y+' '+l.cp2.x+' '+l.cp2.y+' '+b.x+' '+b.y;
      }else if(l.type==='arc')d+=' A '+l.radio+' '+l.radio+' 0 0 '+(l.dir==='concavo'?0:1)+' '+b.x+' '+b.y;
    });
    if(d){const p=document.createElementNS(NS,'path');p.setAttribute('d',d);p.setAttribute('fill','rgba(139,92,246,0.05)');p.setAttribute('stroke','#e2e8f0');p.setAttribute('stroke-width','0.8');p.setAttribute('stroke-linejoin','round');g.appendChild(p);}
    _lines.filter(l=>l.style==='costura').forEach(l=>{const a=_pts[l.from],b=_pts[l.to];if(!a||!b)return;const el=document.createElementNS(NS,'line');el.setAttribute('x1',a.x);el.setAttribute('y1',a.y);el.setAttribute('x2',b.x);el.setAttribute('y2',b.y);el.setAttribute('stroke','#666688');el.setAttribute('stroke-width','0.4');el.setAttribute('stroke-dasharray','4,2');el.setAttribute('fill','none');g.appendChild(el);});
    _lines.filter(l=>l.type==='fold').forEach(l=>{const a=_pts[l.from],b=_pts[l.to];if(!a||!b)return;const el=document.createElementNS(NS,'line');el.setAttribute('x1',a.x);el.setAttribute('y1',a.y);el.setAttribute('x2',b.x);el.setAttribute('y2',b.y);el.setAttribute('stroke','#f87171');el.setAttribute('stroke-width','0.6');el.setAttribute('stroke-dasharray','8,4');el.setAttribute('fill','none');g.appendChild(el);const t=document.createElementNS(NS,'text');t.setAttribute('x',(a.x+b.x)/2+5);t.setAttribute('y',(a.y+b.y)/2);t.setAttribute('font-size','3.5');t.setAttribute('fill','#f87171');t.setAttribute('font-family','Arial');t.textContent='DOBLAR';g.appendChild(t);});
    _lines.filter(l=>l.type==='grain').forEach(l=>{const a=_pts[l.from],b=_pts[l.to];if(!a||!b)return;const el=document.createElementNS(NS,'line');el.setAttribute('x1',a.x);el.setAttribute('y1',a.y);el.setAttribute('x2',b.x);el.setAttribute('y2',b.y);el.setAttribute('stroke','#60a5fa');el.setAttribute('stroke-width','0.7');el.setAttribute('marker-start','url(#arrow-rev)');el.setAttribute('marker-end','url(#arrow)');el.setAttribute('fill','none');g.appendChild(el);});
    _lines.filter(l=>l.type==='notch').forEach(l=>{const a=_pts[l.from],b=_pts[l.to];if(!a||!b)return;const nx=a.x+(b.x-a.x)*(l.pos||.5),ny=a.y+(b.y-a.y)*(l.pos||.5);const tri=document.createElementNS(NS,'polygon');tri.setAttribute('points',nx+','+(ny-4)+' '+(nx-2)+','+(ny+2)+' '+(nx+2)+','+(ny+2));tri.setAttribute('fill','#e2e8f0');g.appendChild(tri);});

    Object.entries(_pts).forEach(([nm,pt])=>{const c=document.createElementNS(NS,'circle');c.setAttribute('cx',pt.x);c.setAttribute('cy',pt.y);c.setAttribute('r','2.5');c.setAttribute('fill','#8b5cf6');c.setAttribute('stroke','#0a0a12');c.setAttribute('stroke-width','0.5');g.appendChild(c);const t=document.createElementNS(NS,'text');t.setAttribute('x',pt.x+3.5);t.setAttribute('y',pt.y-2.5);t.setAttribute('font-size','5.5');t.setAttribute('fill','#a78bfa');t.setAttribute('font-family','Arial');t.setAttribute('font-weight','bold');t.textContent=nm;g.appendChild(t);});
    let mnX=Infinity,mnY=Infinity,mxX=-Infinity,mxY=-Infinity;
    Object.values(_pts).forEach(p=>{mnX=Math.min(mnX,p.x);mnY=Math.min(mnY,p.y);mxX=Math.max(mxX,p.x);mxY=Math.max(mxY,p.y);});

    const ns2=document.createElementNS(NS,'text');ns2.setAttribute('x',cx);ns2.setAttribute('y',cy+4);ns2.setAttribute('font-size','4');ns2.setAttribute('fill','#9490b0');ns2.setAttribute('font-family','Arial');ns2.setAttribute('text-anchor','middle');ns2.textContent='Trazado manual';g.appendChild(ns2);
    const PAD=20;
    return{group:g,bounds:{x:mnX-PAD,y:mnY-PAD,w:(mxX-mnX)+PAD*2,h:(mxY-mnY)+PAD*2},name:_name};
  }

  function compileAndRender(text,measures){
    reset();
    const vars=_vars(measures||{});
    (text||'').split('\n').forEach((raw,idx)=>{
      const line=raw.trim();
      if(!line||line.startsWith('#')||line.startsWith('//'))return;
      try{_parseLine(line,vars);}catch(e){_errs.push('L'+(idx+1)+': '+e.message);}
    });
    return{piece:_svg(),points:{..._pts},errors:[..._errs],warnings:[..._warns],pieceName:_name};
  }

  return{compileAndRender,getPoints:()=>({..._pts}),getErrors:()=>[..._errs]};
})();
</script>

    document.body.appendChild(_modal);

    _svgEl   = document.getElementById('dv6-svg');
    _canvasG = document.getElementById('dv6-canvas');
    _linesG  = document.getElementById('dv6-lines');
    _pointsG = document.getElementById('dv6-pts');
    _dimG    = document.getElementById('dv6-dims');
    _ctrlG   = document.getElementById('dv6-ctrls');
    _tempLine= document.getElementById('dv6-tmp'); // FUERA del canvas

    const wrap = document.getElementById('dv6-wrap');
    setTimeout(() => {
      _pan = { x: wrap.clientWidth * 0.38, y: wrap.clientHeight * 0.3 };
      _applyTransform();

    _bindAll();
    _renderVars();
    _refreshSaved();
    _snapshot(); // snapshot inicial vacío
    _renderAll();
  }

  // ════════════════════════════════════════════════════════════
  // COORDENADAS
  // Puntos almacenados en mm.
  // Canvas transform: translate(pan.x, pan.y) scale(zoom*SC)
  // _mmToSvg: mm → coordenadas SVG (px)
  // _screenToMm: coordenadas de pantalla → mm
  // ════════════════════════════════════════════════════════════
  function _applyTransform() {
    _canvasG.setAttribute('transform', `translate(${_pan.x},${_pan.y}) scale(${_zoom * SC})`);
    document.getElementById('dv6-zl').textContent = Math.round(_zoom * 100) + '%';
  }

  /** Convierte mm del canvas a px del SVG (lo que ve el usuario en pantalla) */
  function _mmToSvg(xMm, yMm) {
    return {
      x: _pan.x + xMm * _zoom * SC,
      y: _pan.y + yMm * _zoom * SC,
    };
  }

  /** Convierte coordenadas de pantalla (clientX/Y) a mm del canvas */
  function _screenToMm(cx, cy) {
    const r = document.getElementById('dv6-wrap').getBoundingClientRect();
    return {
      x: (cx - r.left - _pan.x) / (_zoom * SC),
      y: (cy - r.top  - _pan.y) / (_zoom * SC),
    };
  }

  function _snap(mm) {
    if (!_snapEnabled) return mm;
    let x = Math.round(mm.x / _snapSize) * _snapSize;
    let y = Math.round(mm.y / _snapSize) * _snapSize;

    // Si hay un punto seleccionado, snap también a su X e Y (escuadra)
    if (_selected && _points[_selected]) {
      const sp = _points[_selected];
      const svgCur = _mmToSvg(mm.x, mm.y);
      const svgSel = _mmToSvg(sp.x, sp.y);
      const GUIDE_THRESH = 12; // px de pantalla
      if (Math.abs(svgCur.y - svgSel.y) < GUIDE_THRESH) y = sp.y; // snap a misma altura
      if (Math.abs(svgCur.x - svgSel.x) < GUIDE_THRESH) x = sp.x; // snap a mismo X
    }
    return { x, y };
  }

  // ════════════════════════════════════════════════════════════
  // HISTORIA — undo / redo
  // ════════════════════════════════════════════════════════════
  function _snapshot() {
    const state = {
      points: JSON.parse(JSON.stringify(_points)),
      lines:  JSON.parse(JSON.stringify(_lines)),
      ptCtr:  _ptCtr,
    };
    _history = _history.slice(0, _histIdx + 1);
    _history.push(state);
    if (_history.length > 60) _history.shift();
    _histIdx = _history.length - 1;
    _updateUndoRedo();
  }

  function _undo() {
    if (_histIdx <= 0) return;
    _histIdx--;
    _restore(_history[_histIdx]);
  }

  function _redo() {
    if (_histIdx >= _history.length - 1) return;
    _histIdx++;
    _restore(_history[_histIdx]);
  }

  function _restore(state) {
    _points = JSON.parse(JSON.stringify(state.points));
    _lines  = JSON.parse(JSON.stringify(state.lines));
    _ptCtr  = state.ptCtr;
    _selected = null; _lnStart = null;
    _tempLine.setAttribute('opacity', '0');
    _renderAll();
    _updateUndoRedo();
  }

  function _updateUndoRedo() {
    const u = document.getElementById('dv6-undo');
    const r = document.getElementById('dv6-redo');
    if (u) u.disabled = _histIdx <= 0;
    if (r) r.disabled = _histIdx >= _history.length - 1;
  }

  // ════════════════════════════════════════════════════════════
  // BIND EVENTOS
  // ════════════════════════════════════════════════════════════
  function _bindAll() {
    document.getElementById('dv6-ov').onclick = close;
    document.getElementById('dv6-x').onclick  = close;
    document.getElementById('dv6-nm').oninput = e => _pieceName = e.target.value;

    document.querySelectorAll('[data-tool]').forEach(b => b.onclick = () => _setTool(b.dataset.tool));

    document.getElementById('dv6-zi').onclick   = () => _doZoom(1.25);
    document.getElementById('dv6-zo').onclick   = () => _doZoom(0.8);
    document.getElementById('dv6-zf').onclick   = _fitView;
    document.getElementById('dv6-rect').onclick = _insertRect;
    document.getElementById('dv6-undo').onclick = _undo;
    document.getElementById('dv6-redo').onclick = _redo;
    document.getElementById('dv6-clr').onclick  = () => { if (confirm('¿Limpiar todo?')) { _snapshot(); _clearAll(); } };
    document.getElementById('dv6-sv').onclick   = _save;
    document.getElementById('dv6-svb').onclick  = _save;
    document.getElementById('dv6-ap').onclick   = _addToPattern;
    document.getElementById('dv6-apb').onclick  = _addToPattern;
    document.getElementById('dv6-validate').onclick = _validatePattern;
    document.getElementById('dv6-dpt').onclick  = _delSelected;

    document.getElementById('dv6-snap').onclick = function() {
      _snapEnabled = !_snapEnabled;
      this.classList.toggle('on', _snapEnabled);
      this.textContent = _snapEnabled ? '⊞ Snap ON' : '⊞ Snap 5mm';
    };

    document.getElementById('dv6-dims-btn').onclick = function() {
      _showDims = !_showDims;
      this.classList.toggle('on', _showDims);
      document.getElementById('dv6-dims').style.display = _showDims ? '' : 'none';
    };

    document.getElementById('dv6-grade').onclick = _openGradeModal;
    document.getElementById('dv6-grade-ov').onclick = _closeGradeModal;
    document.getElementById('gr-cancel').onclick = _closeGradeModal;
    document.getElementById('gr-apply').onclick = _applyGrade;

    document.getElementById('dv6-pnm').oninput = _applyProps;
    document.getElementById('dv6-px').oninput  = _applyProps;
    document.getElementById('dv6-py').oninput  = _applyProps;
    document.getElementById('dv6-pf').oninput  = _applyFormula;

    document.getElementById('dv6-csl').oninput = function() {
      const val = parseInt(this.value);
      document.getElementById('dv6-cnm').textContent = val + 'mm';
      if (_selectedLine !== null && _lines[_selectedLine]) {
        const ln = _lines[_selectedLine];
        const a = _points[ln.from], b = _points[ln.to];
        if (a && b) {
          // Convertir el valor del slider a coordenadas absolutas del CP
          const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
          const dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy)||1;
          ln.cpx = mx - (dy/len)*val;
          ln.cpy = my + (dx/len)*val;
          ln.ctrl = null;
        }
        _renderLines();
        _renderCurveControls();
        _renderDims();
      }
    };

    const wrap = document.getElementById('dv6-wrap');
    wrap.addEventListener('mousedown',  _mdown);
    wrap.addEventListener('mousemove',  _mmove);
    wrap.addEventListener('mouseup',    _mup);
    wrap.addEventListener('mouseleave', _mup);
    wrap.addEventListener('wheel', _onWheel, { passive: false });
    document.addEventListener('keydown', _kdown);
  }

  function _onWheel(e) {
    e.preventDefault();
    const r = document.getElementById('dv6-wrap').getBoundingClientRect();
    const mx = e.clientX - r.left, my = e.clientY - r.top;
    const f = e.deltaY < 0 ? 1.12 : 0.89;
    _pan.x = mx - (mx - _pan.x) * f;
    _pan.y = my - (my - _pan.y) * f;
    _zoom = Math.max(0.04, Math.min(20, _zoom * f));
    _applyTransform();
  }

  // ════════════════════════════════════════════════════════════
  // MOUSE
  // ════════════════════════════════════════════════════════════
  let _selectedLine = null; // índice de línea seleccionada (para slider de curva)

  function _mdown(e) {
    if (e.button === 1 || (e.button === 0 && e.altKey)) {
      _isPan = true;
      _panStart = { x: e.clientX - _pan.x, y: e.clientY - _pan.y };
      return;
    }

    const rawMm = _screenToMm(e.clientX, e.clientY);
    const mm    = _snap(rawMm);
    const threshMm = 8 / (_zoom * SC);
    const near = _nearest(mm, threshMm);

    // ¿Clic en punto de control de curva?
    const nearCtrl = _nearestCtrl(mm, threshMm * 1.5);
    if (_tool === 'select' && nearCtrl !== -1) {
      _draggingCtrl = nearCtrl;
      _selectLine(nearCtrl);
      return;
    }

    if (_tool === 'addPoint') {
      _snapshot();
      _addPt(mm.x, mm.y);
      return;
    }

    if (_tool === 'addLine' || _tool === 'addCurve' || _tool === 'addFold') {
      if (!near) {
        _instr('⚠️ Haz clic exactamente sobre un punto existente (círculo morado)');
        return;
      }
      if (!_lnStart) {
        _lnStart = near;
        _renderAll();
        _instr(`✓ Punto ${_points[near].name} seleccionado. Ahora clic en el punto final.`);
      } else if (near !== _lnStart) {
        _snapshot();
        _addLn(_lnStart, near, _tool);
        _lnStart = null;
        _tempLine.setAttribute('opacity', '0');
        _instr(_toolMsg());
      } else {
        _lnStart = null;
        _tempLine.setAttribute('opacity', '0');
        _renderAll();
      }
      return;
    }

    if (_tool === 'select') {
      if (near) {
        _selectPt(near);
        _dragging = near;
        _dragOff = { x: mm.x - _points[near].x, y: mm.y - _points[near].y };
        _selectLine(null);
      } else {
        _deselectPt();
        _selectLine(null);
        _isPan = true;
        _panStart = { x: e.clientX - _pan.x, y: e.clientY - _pan.y };
      }
    }
  }

  function _mmove(e) {
    const rawMm = _screenToMm(e.clientX, e.clientY);
    const mm    = _snap(rawMm);
    const r     = document.getElementById('dv6-wrap').getBoundingClientRect();

    // Mostrar coordenadas
    document.getElementById('dv6-coord').textContent =
      `x: ${Math.round(mm.x)}mm · y: ${Math.round(mm.y)}mm`;

    // Snap indicator (fuera del canvas)
    const sc = document.getElementById('dv6-snapcircle');
    if (_snapEnabled) {
      const svgPos = _mmToSvg(mm.x, mm.y);
      sc.setAttribute('cx', svgPos.x); sc.setAttribute('cy', svgPos.y);
      sc.setAttribute('opacity', '0.8');
    } else {
      sc.setAttribute('opacity', '0');
    }

    // ESCUADRA — mostrar guías horizontales y verticales desde el punto seleccionado
    const guideH = document.getElementById('dv6-guide-h');
    const guideV = document.getElementById('dv6-guide-v');
    if (guideH && guideV) {
      if (_selected && _points[_selected]) {
        const sp = _points[_selected];
        const svgSel = _mmToSvg(sp.x, sp.y);
        const wrap2 = document.getElementById('dv6-wrap');
        const wW = wrap2 ? wrap2.clientWidth : 1200;
        const wH = wrap2 ? wrap2.clientHeight : 800;

        // Línea horizontal (mismo Y que el punto seleccionado)
        guideH.setAttribute('x1', 0); guideH.setAttribute('y1', svgSel.y);
        guideH.setAttribute('x2', wW - 260); guideH.setAttribute('y2', svgSel.y);
        guideH.setAttribute('opacity', '0.7');

        // Línea vertical (mismo X que el punto seleccionado)
        guideV.setAttribute('x1', svgSel.x); guideV.setAttribute('y1', 0);
        guideV.setAttribute('x2', svgSel.x); guideV.setAttribute('y2', wH);
        guideV.setAttribute('opacity', '0.7');

        // Si el cursor está cerca de la guía horizontal, snap a esa Y
        if (_snapEnabled) {
          const curSvg = _mmToSvg(mm.x, mm.y);
          if (Math.abs(curSvg.y - svgSel.y) < 12) {
            // Resaltar la guía H
            guideH.setAttribute('stroke', '#fbbf24');
            guideH.setAttribute('opacity', '1');
          } else {
            guideH.setAttribute('stroke', '#34d399');
          }
          if (Math.abs(curSvg.x - svgSel.x) < 12) {
            guideV.setAttribute('stroke', '#fbbf24');
            guideV.setAttribute('opacity', '1');
          } else {
            guideV.setAttribute('stroke', '#34d399');
          }
        }
      } else {
        guideH.setAttribute('opacity', '0');
        guideV.setAttribute('opacity', '0');
      }
    }

    if (_isPan && _panStart) {
      _pan.x = e.clientX - _panStart.x;
      _pan.y = e.clientY - _panStart.y;
      _applyTransform(); return;
    }

    // Arrastrar punto de control de curva — la curva pasa por donde arrastra el usuario
    if (_draggingCtrl !== null && _lines[_draggingCtrl]) {
      // Calcular el CP para que la curva pase por la posición del mouse
      _setCurveThrough(_draggingCtrl, mm.x, mm.y);
      // Actualizar slider (distancia perpendicular aproximada para display)
      const ln = _lines[_draggingCtrl];
      const a = _points[ln.from], b = _points[ln.to];
      if (a && b && ln.cpx !== undefined) {
        const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
        const dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy)||1;
        const approxCtrl = Math.round(-(dy/len)*(ln.cpx-mx) + (dx/len)*(ln.cpy-my));
        const sl=document.getElementById('dv6-csl');
        if(sl)sl.value=Math.max(-80,Math.min(80,approxCtrl));
        const nm=document.getElementById('dv6-cnm');
        if(nm)nm.textContent=approxCtrl+'mm';
      }
      _renderLines();
      _renderCurveControls();
      _renderDims();
      return;
    }

    // Arrastrar punto
    if (_dragging && _points[_dragging]) {
      const p = _points[_dragging];
      p.x = mm.x - _dragOff.x;
      p.y = mm.y - _dragOff.y;
      p.formula = '';
      _renderAll();
      _updateForm(); return;
    }

    // Línea temporal — ★ CRÍTICO: usa _mmToSvg() para convertir a coords SVG directas
    if (_lnStart && _points[_lnStart]) {
      const from = _points[_lnStart];
      // Convertir AMBOS puntos de mm a coordenadas SVG directas
      const svgFrom = _mmToSvg(from.x, from.y);
      const svgTo   = _mmToSvg(mm.x, mm.y);
      _tempLine.setAttribute('x1', svgFrom.x);
      _tempLine.setAttribute('y1', svgFrom.y);
      _tempLine.setAttribute('x2', svgTo.x);
      _tempLine.setAttribute('y2', svgTo.y);
      _tempLine.setAttribute('opacity', '1');
      const col = _tool==='addFold'?'#f87171':_tool==='addCurve'?'#60a5fa':'#34d399';
      _tempLine.setAttribute('stroke', col);

      // Mostrar distancia en tiempo real
      const dist = Math.hypot(mm.x-from.x, mm.y-from.y);
      const distEl = document.getElementById('dv6-dist');
      if (distEl) {
        distEl.textContent = `${Math.round(dist)}mm = ${(dist/10).toFixed(1)}cm desde ${from.name}`;
        distEl.style.display = 'block';
      }
    } else {
      _tempLine.setAttribute('opacity', '0');
      const distEl = document.getElementById('dv6-dist');
      if (distEl) distEl.style.display = 'none';
    }
  }

  function _mup(e) {
    if (_dragging) _snapshot(); // guardar estado después de arrastrar
    _isPan = false; _panStart = null;
    _dragging = null; _draggingCtrl = null;
  }

  function _kdown(e) {
    if (!_modal?.classList.contains('open')) return;
    if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
    if (e.ctrlKey || e.metaKey) {
      if (e.key==='z'||e.key==='Z') { e.preventDefault(); _undo(); return; }
      if (e.key==='y'||e.key==='Y') { e.preventDefault(); _redo(); return; }
    }
    switch(e.key) {
      case 's': case 'S': _setTool('select'); break;
      case 'p': case 'P': _setTool('addPoint'); break;
      case 'l': case 'L': _setTool('addLine'); break;
      case 'c': case 'C': _setTool('addCurve'); break;
      case 'f': case 'F': _setTool('addFold'); break;
      case 'r': case 'R': _insertRect(); break;
      case 'Escape': _lnStart=null; _tempLine.setAttribute('opacity','0'); _setTool('select'); break;
      case 'Delete': case 'Backspace': if(_selected)_delSelected(); break;
    }
  }

  // ════════════════════════════════════════════════════════════
  // HERRAMIENTAS
  // ════════════════════════════════════════════════════════════
  function _setTool(t) {
    _tool=t; _lnStart=null;
    _tempLine.setAttribute('opacity','0');
    document.getElementById('dv6-dist').style.display='none';
    document.querySelectorAll('[data-tool]').forEach(b=>b.classList.toggle('on',b.dataset.tool===t));
    const w=document.getElementById('dv6-wrap');
    w.className='dv6-cv'+(t==='select'?' sel':t==='addPoint'?' pt':' ln');
    _instr(_toolMsg());
    _renderAll();
  }

  function _toolMsg() {
    return {
      select:   '▶ Clic para seleccionar · Arrastrar para mover · Alt+drag para mover la vista',
      addPoint: '＋ Clic en el canvas para agregar punto. Con Snap ON se alinea a la grilla.',
      addLine:  '╱ Clic en punto A → clic en punto B — traza línea recta. La distancia aparece en verde.',
      addCurve: '⌒ Clic en punto A → clic en punto B — traza curva. Arrastra el ◆ azul para ajustar.',
      addFold:  '— Clic en punto A → clic en punto B — marca doblez (rojo) o hilo recto.',
    }[_tool]||'';
  }

  function _instr(t) { const el=document.getElementById('dv6-instr');if(el)el.textContent=t; }

  // ════════════════════════════════════════════════════════════
  // PUNTOS
  // ════════════════════════════════════════════════════════════
  const ALFA='ABCDEFGHIJKLMNOPQRSTUVWXYZ';

  function _addPt(xMm,yMm,name,formula) {
    _ptCtr++;
    const id='pt'+Date.now()+_ptCtr;
    const nm=name||(ALFA[Object.keys(_points).length%26]||String(_ptCtr));
    _points[id]={x:xMm,y:yMm,name:nm,formula:formula||''};
    _selectPt(id); _renderAll(); return id;
  }

  function _nearest(mm,thresh) {
    let near=null,d=thresh;
    Object.entries(_points).forEach(([id,p])=>{
      const dist=Math.hypot(p.x-mm.x,p.y-mm.y);
      if(dist<d){d=dist;near=id;}
    });
    return near;
  }

  function _nearestCtrl(mm,thresh) {
    // Detectar clic en el diamante de control O en cualquier punto de la curva
    for(let i=0;i<_lines.length;i++){
      const ln=_lines[i];if(ln.type!=='curve')continue;
      const a=_points[ln.from],b=_points[ln.to];if(!a||!b)continue;
      const {cpx,cpy}=_curveCP(a,b,ln.ctrl);
      // 1. Cerca del punto de control (diamante)
      if(Math.hypot(cpx-mm.x,cpy-mm.y)<thresh*2)return i;
      // 2. Cerca de cualquier punto de la curva Bézier (muestreo)
      for(let t=0.05;t<=0.95;t+=0.05){
        const px=(1-t)*(1-t)*a.x+2*(1-t)*t*cpx+t*t*b.x;
        const py=(1-t)*(1-t)*a.y+2*(1-t)*t*cpy+t*t*b.y;
        if(Math.hypot(px-mm.x,py-mm.y)<thresh*1.5)return i;
      }
    }
    return -1;
  }

  function _selectPt(id){_selected=id;_renderAll();_updateForm();}
  function _deselectPt(){_selected=null;_renderAll();_updateForm();}

  function _delSelected(){
    if(!_selected)return;
    _snapshot();
    _lines=_lines.filter(l=>l.from!==_selected&&l.to!==_selected);
    delete _points[_selected];_selected=null;_lnStart=null;
    _tempLine.setAttribute('opacity','0');
    _renderAll();_updateForm();
  }

  // ════════════════════════════════════════════════════════════
  // LÍNEAS
  // ════════════════════════════════════════════════════════════
  function _addLn(fromId,toId,tool){
    const type=tool==='addCurve'?'curve':tool==='addFold'?'fold':'line';
    const ctrl=type==='curve'?20:0; // 20mm de curvatura inicial para curvas
    _lines.push({from:fromId,to:toId,type,ctrl});
    _renderAll();
  }

  function _selectLine(idx){
    _selectedLine=idx;
    const slider=document.getElementById('dv6-ctrl-slider');
    if(idx===null||!_lines[idx]||_lines[idx].type!=='curve'){
      if(slider)slider.classList.remove('vis');
      _renderCurveControls();
      return;
    }
    const sl=document.getElementById('dv6-csl');
    const nm=document.getElementById('dv6-cnm');
    if(sl){sl.value=_lines[idx].ctrl;nm.textContent=_lines[idx].ctrl+'mm';}
    if(slider)slider.classList.add('vis');
    _renderCurveControls();
  }

  // ════════════════════════════════════════════════════════════
  // RECTÁNGULO BASE
  // ════════════════════════════════════════════════════════════
  function _insertRect(){
    const m=_getMeasures();
    const W=m.bust/4*10;    // B4 en mm
    const H=m.backLength*10; // TALLE_ESP en mm
    _snapshot();
    _clearAll();
    const A=_addPt(0,0,'A','0');
    const B=_addPt(W,0,'B','B4');
    const C=_addPt(W,H,'C','TALLE_ESP');
    const D=_addPt(0,H,'D','TALLE_ESP');
    _lines=[
      {from:A,to:B,type:'line',ctrl:0},
      {from:B,to:C,type:'line',ctrl:0},
      {from:C,to:D,type:'line',ctrl:0},
      {from:D,to:A,type:'fold',ctrl:0},
    ];
    _pieceName='Rectángulo Base';
    document.getElementById('dv6-nm').value=_pieceName;
    _snapshot();
    _renderAll();_fitView();
    _setTool('addPoint');
    _instr(`⬜ ${Math.round(W)}×${Math.round(H)}mm · A(0,0) B(${Math.round(W)},0) C(${Math.round(W)},${Math.round(H)}) D(0,${Math.round(H)}). Agrega puntos [P].`);
  }

  function _clearAll(){
    _points={};_lines={};_lines=[];_ptCtr=0;_selected=null;_lnStart=null;
    _selectedLine=null;_tempLine.setAttribute('opacity','0');
    _renderAll();
  }

  // ════════════════════════════════════════════════════════════
  // CURVA — punto de control
  // ════════════════════════════════════════════════════════════
  /** Retorna el punto de control de la curva.
   * Si la línea tiene cpx/cpy absolutos, los usa directamente.
   * Si solo tiene ctrl (offset perpendicular), lo convierte. */
  function _curveCP(a, b, ln) {
    // Si es solo un número (legado), usar perpendicular
    if (typeof ln === 'number') {
      const ctrl = ln;
      const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
      const dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy)||1;
      return { cpx: mx-(dy/len)*ctrl, cpy: my+(dx/len)*ctrl };
    }
    // Si la línea tiene coordenadas absolutas del CP, usarlas
    if (ln && ln.cpx !== undefined && ln.cpx !== null) {
      return { cpx: ln.cpx, cpy: ln.cpy };
    }
    // Calcular default: 20mm perpendicular desde el midpoint
    const ctrl = (ln && ln.ctrl != null) ? ln.ctrl : 20;
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
    const dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy)||1;
    return { cpx: mx-(dy/len)*ctrl, cpy: my+(dx/len)*ctrl };
  }

  /** Actualiza el CP de una curva para que pase por (targetX,targetY) */
  function _setCurveThrough(lineIdx, targetX, targetY) {
    const ln = _lines[lineIdx];
    const a = _points[ln.from], b = _points[ln.to];
    if (!a || !b) return;
    // 1. Encontrar el parámetro t más cercano al punto donde el usuario hizo clic
    const { cpx: oldCpx, cpy: oldCpy } = _curveCP(a, b, ln);
    let bestT = 0.5, minDist = Infinity;
    for (let t = 0.02; t <= 0.98; t += 0.02) {
      const px = (1-t)*(1-t)*a.x + 2*(1-t)*t*oldCpx + t*t*b.x;
      const py = (1-t)*(1-t)*a.y + 2*(1-t)*t*oldCpy + t*t*b.y;
      const d = Math.hypot(px - targetX, py - targetY);
      if (d < minDist) { minDist = d; bestT = t; }
    }
    const t = bestT;
    const denom = 2 * t * (1 - t);
    if (Math.abs(denom) < 0.005) return;
    // 2. Calcular el CP que hace pasar la curva por el punto target en t
    // Q(t) = (1-t)²A + 2t(1-t)CP + t²B = target
    // → CP = (target - (1-t)²A - t²B) / (2t(1-t))
    ln.cpx = (targetX - (1-t)*(1-t)*a.x - t*t*b.x) / denom;
    ln.cpy = (targetY - (1-t)*(1-t)*a.y - t*t*b.y) / denom;
    ln.ctrl = null; // ya no usamos el offset escalar
  }

  // ════════════════════════════════════════════════════════════
  // RENDER
  // ════════════════════════════════════════════════════════════
  function _renderAll(){_renderLines();_renderCurveControls();_renderPoints();_renderDims();_refreshPanel();}

  function _renderLines(){
    while(_linesG.firstChild)_linesG.removeChild(_linesG.firstChild);
    const sw=0.5; // mm — el canvas transform escala esto

    // Relleno
    let d='';
    _lines.forEach(ln=>{
      const a=_points[ln.from],b=_points[ln.to];if(!a||!b)return;
      if(!d)d=`M ${a.x} ${a.y}`;
      if(ln.type==='curve'){const{cpx,cpy}=_curveCP(a,b,ln.ctrl);d+=` Q ${cpx} ${cpy} ${b.x} ${b.y}`;}
      else d+=` L ${b.x} ${b.y}`;
    });
    if(d){const f=document.createElementNS(NS,'path');f.setAttribute('d',d);f.setAttribute('fill','rgba(139,92,246,.06)');f.setAttribute('stroke','none');f.setAttribute('pointer-events','none');_linesG.appendChild(f);}

    _lines.forEach((ln,i)=>{
      const a=_points[ln.from],b=_points[ln.to];if(!a||!b)return;
      let el;
      if(ln.type==='curve'){
        const{cpx,cpy}=_curveCP(a,b,ln);
        el=document.createElementNS(NS,'path');
        el.setAttribute('d',`M ${a.x} ${a.y} Q ${cpx} ${cpy} ${b.x} ${b.y}`);
        el.setAttribute('stroke',i===_selectedLine?'#93c5fd':'#60a5fa');
        el.setAttribute('fill','none');
      }else{
        el=document.createElementNS(NS,'line');
        el.setAttribute('x1',a.x);el.setAttribute('y1',a.y);el.setAttribute('x2',b.x);el.setAttribute('y2',b.y);
        el.setAttribute('stroke',ln.type==='fold'?'#f87171':'#e2e8f0');
        if(ln.type==='fold')el.setAttribute('stroke-dasharray','3,1.5');
      }
      el.setAttribute('stroke-width',sw);
      _linesG.appendChild(el);
    });
  }

  function _renderCurveControls(){
    while(_ctrlG.firstChild)_ctrlG.removeChild(_ctrlG.firstChild);
    const sz=4; // mm — más grande para facilitar agarre

    _lines.forEach((ln,i)=>{
      if(ln.type!=='curve')return;
      const a=_points[ln.from],b=_points[ln.to];if(!a||!b)return;
      const{cpx,cpy}=_curveCP(a,b,ln);
      const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;

      // Línea de guía
      const guide=document.createElementNS(NS,'line');
      guide.setAttribute('x1',mx);guide.setAttribute('y1',my);
      guide.setAttribute('x2',cpx);guide.setAttribute('y2',cpy);
      guide.setAttribute('stroke','rgba(96,165,250,.4)');guide.setAttribute('stroke-width','0.4');
      guide.setAttribute('stroke-dasharray','2,1.5');
      _ctrlG.appendChild(guide);

      // Zona de hit invisible (grande) para facilitar agarre
      const hitZone=document.createElementNS(NS,'circle');
      hitZone.setAttribute('cx',cpx);hitZone.setAttribute('cy',cpy);hitZone.setAttribute('r',sz*2);
      hitZone.setAttribute('fill','transparent');hitZone.setAttribute('stroke','none');
      hitZone.style.cursor='move';
      _ctrlG.appendChild(hitZone);

      // Diamante visible
      const pts=`${cpx},${cpy-sz} ${cpx+sz},${cpy} ${cpx},${cpy+sz} ${cpx-sz},${cpy}`;
      const diamond=document.createElementNS(NS,'polygon');
      diamond.setAttribute('points',pts);
      diamond.setAttribute('fill',i===_selectedLine?'#93c5fd':'#60a5fa');
      diamond.setAttribute('stroke','#ede9fe');
      diamond.setAttribute('stroke-width',i===_selectedLine?'0.5':'0.3');
      diamond.style.cursor='move';
      _ctrlG.appendChild(diamond);

      // Etiqueta con valor de curvatura
      const lbl=document.createElementNS(NS,'text');
      lbl.setAttribute('x',cpx+sz*1.4);lbl.setAttribute('y',cpy);
      lbl.setAttribute('font-size','3.5');lbl.setAttribute('fill','#60a5fa');
      lbl.setAttribute('font-family','monospace');
      lbl.textContent=Math.round(ln.ctrl)+'mm';
      _ctrlG.appendChild(lbl);
    });
  }

  function _renderPoints(){
    while(_pointsG.firstChild)_pointsG.removeChild(_pointsG.firstChild);
    const r=2,fs=5,hit=5;

    Object.entries(_points).forEach(([id,p])=>{
      const g=document.createElementNS(NS,'g');
      g.id='dv6pt-'+id;g.style.cursor=_tool==='select'?'pointer':'crosshair';

      const hc=document.createElementNS(NS,'circle');
      hc.setAttribute('cx',p.x);hc.setAttribute('cy',p.y);hc.setAttribute('r',hit);
      hc.setAttribute('fill','transparent');g.appendChild(hc);

      const c=document.createElementNS(NS,'circle');
      c.setAttribute('cx',p.x);c.setAttribute('cy',p.y);c.setAttribute('r',r);
      c.setAttribute('fill',id===_selected?'#fbbf24':id===_lnStart?'#34d399':'#8b5cf6');
      c.setAttribute('stroke','#06060c');c.setAttribute('stroke-width','0.3');g.appendChild(c);

      const t=document.createElementNS(NS,'text');
      t.setAttribute('x',p.x+r*1.6);t.setAttribute('y',p.y-r*0.7);
      t.setAttribute('font-size',fs);t.setAttribute('fill',id===_selected?'#fbbf24':'#a78bfa');
      t.setAttribute('font-family','Arial');t.setAttribute('font-weight','bold');
      t.textContent=p.name;g.appendChild(t);

      if(p.formula){
        const ft=document.createElementNS(NS,'text');
        ft.setAttribute('x',p.x+r*1.6);ft.setAttribute('y',p.y+fs*0.9);
        ft.setAttribute('font-size',fs*0.7);ft.setAttribute('fill','#3d3d58');
        ft.setAttribute('font-family','monospace');ft.textContent=p.formula;g.appendChild(ft);
      }

      _pointsG.appendChild(g);
    });
  }

  function _renderDims(){
    while(_dimG.firstChild)_dimG.removeChild(_dimG.firstChild);
    if(!_showDims)return;
    const fs=3.2;

    _lines.forEach(ln=>{
      if(ln.type==='fold')return;
      const a=_points[ln.from],b=_points[ln.to];if(!a||!b)return;

      let distMm;
      if(ln.type==='curve'){
        // Aproximar longitud de la curva
        const{cpx,cpy}=_curveCP(a,b,ln);
        distMm=Math.round(Math.hypot((a.x+cpx)/2-b.x,(a.y+cpy)/2-b.y)+Math.hypot(a.x-cpx,a.y-cpy));
      }else{
        distMm=Math.round(Math.hypot(b.x-a.x,b.y-a.y));
      }
      if(distMm<5)return;

      const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
      const dx=b.x-a.x,dy=b.y-a.y,len=Math.hypot(dx,dy)||1;
      const OFF=5;

      // Línea de cota
      const cotaLine=document.createElementNS(NS,'line');
      cotaLine.setAttribute('x1',mx-(dy/len)*OFF*0.5);cotaLine.setAttribute('y1',my+(dx/len)*OFF*0.5);
      cotaLine.setAttribute('x2',mx-(dy/len)*OFF);cotaLine.setAttribute('y2',my+(dx/len)*OFF);
      cotaLine.setAttribute('stroke','#3d3d58');cotaLine.setAttribute('stroke-width','0.2');
      _dimG.appendChild(cotaLine);

      const t=document.createElementNS(NS,'text');
      t.setAttribute('x',mx-(dy/len)*OFF*1.4);t.setAttribute('y',my+(dx/len)*OFF*1.4);
      t.setAttribute('font-size',fs);t.setAttribute('fill','#5a5678');
      t.setAttribute('font-family','monospace');t.setAttribute('text-anchor','middle');
      t.textContent=distMm+'mm';
      _dimG.appendChild(t);

      // También mostrar en cm si > 10mm
      if(distMm>=10){
        const t2=document.createElementNS(NS,'text');
        t2.setAttribute('x',mx-(dy/len)*OFF*1.4);t2.setAttribute('y',my+(dx/len)*OFF*1.4+fs*1.2);
        t2.setAttribute('font-size',fs*0.85);t2.setAttribute('fill','#3d3d58');
        t2.setAttribute('font-family','monospace');t2.setAttribute('text-anchor','middle');
        t2.textContent='('+((distMm/10).toFixed(1))+'cm)';
        _dimG.appendChild(t2);
      }
    });
  }

  // ════════════════════════════════════════════════════════════
  // PANEL PROPIEDADES
  // ════════════════════════════════════════════════════════════
  function _updateForm(){
    const form=document.getElementById('dv6-pform');
    const nosel=document.getElementById('dv6-nosel');
    const badge=document.getElementById('dv6-badge');
    if(!_selected||!_points[_selected]){
      form.style.display='none';nosel.style.display='';badge.textContent='—';return;
    }
    const p=_points[_selected];
    form.style.display='';nosel.style.display='none';badge.textContent=p.name;
    document.getElementById('dv6-pnm').value=p.name;
    document.getElementById('dv6-px').value=Math.round(p.x*10)/10;
    document.getElementById('dv6-py').value=Math.round(p.y*10)/10;
    document.getElementById('dv6-pf').value=p.formula||'';
    _updateFVal();
  }

  function _updateFVal(){
    const p=_selected&&_points[_selected];
    if(!p||!p.formula){document.getElementById('dv6-fv').textContent='—';return;}
    const v=_evalF(p.formula);
    document.getElementById('dv6-fv').textContent=v!==null?`= ${Math.round(v)}mm`:'— fórmula inválida';
  }

  function _applyProps(){
    if(!_selected||!_points[_selected])return;
    const p=_points[_selected];
    const nm=document.getElementById('dv6-pnm').value.trim().toUpperCase();
    if(nm)p.name=nm;
    p.x=parseFloat(document.getElementById('dv6-px').value)||0;
    p.y=parseFloat(document.getElementById('dv6-py').value)||0;
    _renderAll();
  }

  function _applyFormula(){
    if(!_selected||!_points[_selected])return;
    _points[_selected].formula=document.getElementById('dv6-pf').value.trim();
    _updateFVal();_renderAll();
  }

  function _refreshPanel(){
    const ptlist=document.getElementById('dv6-ptlist');
    const lnlist=document.getElementById('dv6-lnlist');
    if(!ptlist)return;
    const ptKeys=Object.keys(_points);
    document.getElementById('dv6-ptcnt').textContent=ptKeys.length;
    ptlist.innerHTML='';
    ptKeys.forEach(id=>{
      const p=_points[id];
      const div=document.createElement('div');div.className='dv6-pti'+(id===_selected?' on':'');
      div.innerHTML=`<div class="dv6-pdot"></div><span class="dv6-pnm">${p.name}</span><span class="dv6-pco">${Math.round(p.x)},${Math.round(p.y)}mm</span>${p.formula?`<span style="font-size:9px;color:#a78bfa;font-family:monospace">${p.formula}</span>`:''}<button class="dv6-pdel">✕</button>`;
      div.addEventListener('click',e=>{if(e.target.classList.contains('dv6-pdel'))return;_selectPt(id);});
      div.querySelector('.dv6-pdel').addEventListener('click',()=>{_snapshot();_lines=_lines.filter(l=>l.from!==id&&l.to!==id);delete _points[id];if(_selected===id)_selected=null;_renderAll();});
      ptlist.appendChild(div);
    });
    lnlist.innerHTML='';
    document.getElementById('dv6-lncnt').textContent=_lines.length;
    _lines.forEach((ln,i)=>{
      const a=_points[ln.from],b=_points[ln.to];if(!a||!b)return;
      const col=ln.type==='fold'?'#f87171':ln.type==='curve'?'#60a5fa':'#e2e8f0';
      const bg=ln.type==='fold'?'repeating-linear-gradient(90deg,#f87171 0,#f87171 4px,transparent 4px,transparent 8px)':col;
      const div=document.createElement('div');div.className='dv6-lni'+(i===_selectedLine?' on':'');
      div.innerHTML=`<div class="dv6-lbar" style="background:${bg}"></div><span class="dv6-llb">${a.name}→${b.name} <span style="color:#3d3d58">(${ln.type}${ln.type==='curve'?' '+ln.ctrl+'mm':''})</span></span><button class="dv6-ldel">✕</button>`;
      div.addEventListener('click',e=>{if(e.target.classList.contains('dv6-ldel'))return;_selectLine(i===_selectedLine?null:i);_refreshPanel();});
      div.querySelector('.dv6-ldel').addEventListener('click',()=>{_snapshot();_lines.splice(i,1);if(_selectedLine===i)_selectLine(null);_renderAll();});
      lnlist.appendChild(div);
    });
  }

  // ════════════════════════════════════════════════════════════
  // VARIABLES
  // ════════════════════════════════════════════════════════════
  function _renderVars(){
    const m=_getMeasures();
    const vars=[
      {k:'B4',v:Math.round(m.bust*10/4)},{k:'B6',v:Math.round(m.bust*10/6)},
      {k:'B8',v:Math.round(m.bust*10/8)},{k:'E2',v:Math.round(m.shoulder*10/2)},
      {k:'H4',v:Math.round(m.hip*10/4)},{k:'W4',v:Math.round(m.waist*10/4)},
      {k:'TALLE_ESP',v:m.backLength*10},{k:'TALLE_DEL',v:m.frontLength*10},
      {k:'LARGO',v:m.totalLength*10},{k:'MANGA',v:m.sleeveLength*10},
      {k:'CUELLO',v:m.neck*10},{k:'FALDA',v:m.skirtLength*10},
    ];
    const el=document.getElementById('dv6-vl');if(!el)return;
    el.innerHTML='';
    vars.forEach(v=>{
      const sp=document.createElement('span');sp.className='dv6-vc';
      sp.title=v.v+'mm';sp.textContent=v.k;
      sp.onclick=()=>{
        if(_selected&&_points[_selected]){
          _points[_selected].formula=v.k;
          document.getElementById('dv6-pf').value=v.k;
          document.getElementById('dv6-fv').textContent='= '+v.v+'mm';
          _renderAll();
        }
      };
      el.appendChild(sp);
    });
  }

  // GRADACIÓN DE TALLAS

  function _openGradeModal(){

    document.getElementById('gr-waist').value=m.waist;
    document.getElementById('gr-hip').value=m.hip;

    document.getElementById('gr-back').value=m.backLength;
